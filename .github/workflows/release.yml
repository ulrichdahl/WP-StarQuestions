name: Build and Release Plugin Zip

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install gettext
        run: sudo apt-get update && sudo apt-get install -y gettext zip

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build translation files
        run: |
          find languages -name '*.po' -print0 | while IFS= read -r -d '' f; do
            msgfmt -o "${f%.po}.mo" "$f"
          done

      - name: Create plugin zip
        run: |
          PLUGIN_NAME="$(basename "$GITHUB_WORKSPACE")"
          ZIP_NAME="${PLUGIN_NAME}-v${{ steps.version.outputs.VERSION }}.zip"
          cd ..
          zip -r "$ZIP_NAME" "$PLUGIN_NAME" \
            -x "$PLUGIN_NAME/.git*" \
            -x "$PLUGIN_NAME/.idea*" \
            -x "$PLUGIN_NAME/.github/*" \
            -x "$PLUGIN_NAME/build.sh"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ../${{ github.event.repository.name }}-v${{ steps.version.outputs.VERSION }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}